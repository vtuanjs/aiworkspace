<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIWorkspace</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: #1e1e2e; }
      #root { height: 100%; }

      /* Monaco search decorations */
      .search-result-highlight {
        background: rgba(249, 226, 175, 0.3);
        border-radius: 2px;
        outline: 1px solid rgba(249, 226, 175, 0.6);
      }
      .search-result-line {
        background: rgba(203, 166, 247, 0.08);
        border-left: 2px solid #cba6f7;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
